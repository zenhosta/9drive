services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/prisma/dev.db
      APP_PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-jwt-secret-at-least-32-chars}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-change-this-encryption-key-32bytes!}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-3600}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      MAX_UPLOAD_BYTES: 5368709120
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:4000/connected-accounts/google/callback}
    ports:
      - "4001:4000"
    volumes:
      - sqlite_data:/app/prisma

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  sqlite_data:
