services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: 9drive
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend-python
    ports:
      - "4000:4000"
    env_file:
      - ./backend-python/.env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
